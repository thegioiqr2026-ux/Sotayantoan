<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>VDC - Sổ Tay An Toàn Vệ Sinh Lao Động</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root { --theme-color: #d32f2f; }
    body { font-family: 'Segoe UI', sans-serif; -webkit-user-select: none; user-select: none; }
    .sidebar { background-color: #f8f9fa; }
    .sidebar-nav b { color: #d32f2f; text-transform: uppercase; font-size: 0.9em; }
    .markdown-section { max-width: 900px; padding: 30px; line-height: 1.8; }
    .markdown-section h1 { color: #b71c1c; border-bottom: 2px solid #d32f2f; padding-bottom: 10px; }
    @media print { body { display: none !important; } }
    .cta-button {
      position: fixed; bottom: 20px; right: 20px; background: linear-gradient(135deg, #d32f2f 0%, #b71c1c 100%);
      color: white !important; padding: 12px 25px; border-radius: 50px;
      font-weight: bold; z-index: 999; text-decoration: none; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>
  <div id="app">Đang tải tài liệu VDC...</div>
  <a href="https://zalo.me/your_number" class="cta-button">📩 ĐĂNG KÝ HUẤN LUYỆN</a>
  <script>
    window.$docsify = {
      name: 'VDC Safety',
      loadSidebar: true,
      subMaxLevel: 3,
      search: 'auto',
      pagination: { previousText: 'BÀI TRƯỚC', nextText: 'BÀI TIẾP THEO' }
    }
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.onkeydown = e => { if (e.ctrlKey && (e.keyCode===67 || e.keyCode===80 || e.keyCode===85)) return false; };
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
</body>
</html>
